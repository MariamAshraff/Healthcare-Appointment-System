<header class="header d-flex align-items-center justify-content-between px-4 shadow-sm bg-white">
  <div class="header-left d-flex align-items-center">
    <div class="logo-wrapper me-4">
      <img src="" width="120" alt="Preclinic Logo">
    </div>
    <!-- <button class="btn btn-light rounded-circle sidebar-toggle shadow-sm">
      <i class="bi bi-list"></i>
    </button> -->
  </div>
  <nav class="d-none d-lg-flex gap-4 ms-5">
      <a routerLink="/home" routerLinkActive="active" class="nav-link-custom">Home</a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link-custom">About</a>
      <a routerLink="/services"  routerLinkActive="active"class="nav-link-custom">Services</a>
      <a routerLink="/doctors" routerLinkActive="active" class="nav-link-custom">Doctors</a>
    </nav>

  <div class="header-right d-flex align-items-center gap-3">
    <div class="search-bar position-relative d-none d-lg-block">
      <i class="bi bi-search position-absolute start-0 top-50 translate-middle-y ms-3 text-muted"></i>
      <input type="text" class="form-control rounded-pill ps-5 bg-light border-0 shadow-none" placeholder="Search here">
    </div>

    <button class="btn btn-ai-gradient d-flex align-items-center gap-2 px-3 py-2 rounded-3 shadow-sm">
      <i class="bi bi-stars"></i>
      <span class="fw-bold small">AI Assistance</span>
    </button>

    <div class="header-icons d-flex gap-2">
      <button class="btn btn-icon-round"><i class="bi bi-calendar4-event"></i></button>
      <button class="btn btn-icon-round position-relative">
        <i class="bi bi-bell"></i>
        <span class="notification-badge"></span>
      </button>
      <button class="btn btn-icon-round"><i class="bi bi-chat-dots"></i></button>
    </div>

    @if(authService.isAuthenticated()){
    <div class="user-profile dropdown d-flex align-items-center gap-2 ms-2 ps-3 border-start">
      <div class="d-flex align-items-center gap-2" role="button" data-bs-toggle="dropdown" aria-expanded="false"
        style="cursor: pointer;">
        <div class="text-end d-none d-sm-block">
          <p class="mb-0 fw-bold small text-dark">{{ (authService.user$ | async)?.name }}</p>
          <p class="mb-0 text-muted" style="font-size: 10px;">{{ authService.getRole() | uppercase }}</p>
        </div>
        <img
          [src]="(authService.user$ | async)?.avatar ||
         'https://ui-avatars.com/api/?name=' + (authService.user$ | async)?.name + '&background=f0f4ff&color=2e59d9&bold=true'"
          class="rounded-circle profile-img border shadow-sm" alt="User Avatar">
      </div>

      <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="border-radius: 12px;">
        <li>
          <h6 class="dropdown-header">User Settings</h6>
        </li>
        @if (authService.user$ | async; as currentUser) {
        <li>
          <a class="dropdown-item d-flex align-items-center gap-2 py-2"
            [routerLink]="['/' + currentUser.role + '/details', currentUser.id]">
            <i class="bi bi-person text-muted"></i> My Profile
          </a>
        </li>
        }

        <li>
          <hr class="dropdown-divider">
        </li>
        <li>
          <a class="dropdown-item d-flex align-items-center gap-2 py-2 text-danger" (click)="onLogout()"
            style="cursor: pointer;">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </li>
      </ul>
    </div>
    }

  </div>
</header>
