@if (config) {
<div class="dialog-overlay">
  <div class="dialog-card" style="background-color: var(--bg-card); color: var(--text-title);">
    <div class="text-center mb-4">
      <i class="bi bi-exclamation-triangle text-warning fs-1"></i>
      <h3 class="fw-bold text-title mt-2">{{ config.title }}</h3>
      <p class="text-small px-3" style="color: var(--text-small)">{{ config.message }}</p>
    </div>
    <div class="d-flex gap-2 p-3 border-top border-light">
      <button class="btn btn-light w-100" (click)="onAction(false)">Cancel</button>
      <button class="btn btn-danger w-100" (click)="onAction(true)">Confirm</button>
    </div>
  </div>
</div>
}
