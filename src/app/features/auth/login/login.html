<div class="login-container d-flex align-items-center justify-content-center overflow-hidden">

  <div class="animation-wrapper">
    <img src="before.png" class="moving-img before-img" alt="Sick person">
    <img src="after.png" class="moving-img after-img" alt="Healthy person">
  </div>
  <div class="login-card shadow-lg p-4 bg-white" style="width: 400px; border-radius: 20px; z-index: 10; position: relative;">

    <div class="text-center mb-4">

      <h4 class="fw-bold text-dark-blue">Welcome Back</h4>
      <!-- <p class="text-muted small"></p> -->
    </div>

    @if (errorMessage) {
    <div class="alert alert-danger small py-2">{{ errorMessage }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
          <input type="email" formControlName="email" class="form-control bg-light border-0"
            placeholder="name@example.com">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold text-muted">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
          <input type="password" formControlName="password" class="form-control bg-light border-0"
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="btn btn-primary-gradient w-100 py-2 fw-bold shadow-sm">
        Login
      </button>
    </form>

    <div class="mt-4 p-3 bg-light rounded-3">
      <p class="fw-bold small mb-2 text-center text-primary">Demo Credentials</p>
      <div class="small text-muted">
        <div class="d-flex justify-content-between mb-1">
          <span><strong>Admin:</strong> admin@health.com</span>
          <span>pass: admin123</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
          <span><strong>Doctor:</strong> ahmed@doctor.com</span>
          <span>pass: doctor123</span>
        </div>
        <div class="d-flex justify-content-between">
          <span><strong>Patient:</strong> mohamed@patient.com</span>
          <span>pass: patient123</span>
        </div>
      </div>
    </div>

  </div>
</div>
