<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar shadow-sm p-0 overflow-auto">
      <div class="sidebar-sticky">
        <div class="logo p-4 text-center">
          <img src="assets/logo.png" width="140" alt="Mediva Logo">
        </div>

        <ul class="nav flex-column mt-2">
          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" routerLink="stats" routerLinkActive="active">
              <i class="bi bi-grid-fill me-3"></i> Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex justify-content-between align-items-center" (click)="toggleDoctors()"
              style="cursor: pointer;">
              <span><i class="bi bi-person-badge-fill me-3"></i> Doctors</span>
              <i class="bi" [ngClass]="isDoctorsOpen ? 'bi-chevron-down' : 'bi-chevron-right'"
                style="font-size: 0.8rem;"></i>
            </a>

            @if (isDoctorsOpen) {
            <ul class="nav flex-column ms-3 sub-menu">
              <li class="nav-item">
                <a class="nav-link" routerLink="doctors" routerLinkActive="active"
                  [routerLinkActiveOptions]="{exact: true}">
                  Doctors List
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" routerLink="add-doctor" routerLinkActive="active">
                  Add Doctor
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" routerLink="doctor-details/1" routerLinkActive="active">
                  Doctor Schedule
                </a>
              </li>
            </ul>
            }
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" routerLink="patients" routerLinkActive="active">
              <i class="bi bi-people-fill me-3"></i> Patients
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" routerLink="appointments" routerLinkActive="active">
              <i class="bi bi-calendar-check-fill me-3"></i> Appointments
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 bg-light-soft min-vh-100">
      <div
        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h4 text-dark-blue fw-bold">Admin Panel</h1>
      </div>

      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
