<div class="container mt-4">
  <div class="row mb-4 align-items-center">
    <div class="col">
      <h2 class="fw-bold">
        Patients
        <span class="badge bg-light text-dark shadow-sm ms-2" style="font-size: 0.5em; vertical-align: middle;">
          Total: {{ patients?.length || 0 }}
        </span>
      </h2>
    </div>
  </div>

  <div class="row g-4">
    @if (patients && patients.length > 0) {

      @for (item of patients; track item.id) {
        <div class="col-12 col-md-6 col-lg-4">
          <app-patient-card [patient]="item"></app-patient-card>
        </div>
      }

    } @else {
      <div class="col-12 text-center py-5">
        <div class="empty-state-container">
          <i class="bi bi-people text-muted" style="font-size: 3rem;"></i>
          <p class="text-muted mt-3">No patients found in the database.</p>
        </div>
      </div>
    }
  </div>
</div>
