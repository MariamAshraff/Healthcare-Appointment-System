<div class="appointment-row py-3 px-4 border-bottom bg-white d-flex align-items-center">
  <div class="col-datetime flex-grow-1">
    <div class="fw-medium text-secondary">{{ prescription.createdAt| date:'dd MMM yyyy' }}</div>
  </div>
  <div class="col-doctor flex-grow-1">
    <div class="d-flex align-items-center clickable-profile">
      <img [src]="doctor?.avatar" class="rounded-circle me-3 border" alt="Doctor"
        style="width: 45px; height: 45px; object-fit: cover;">
      <div class="clickable-profile" [routerLink]="['/patient/doctor', doctor?.id]">
        <div class="fw-bold doctor-name">{{ doctor?.name }}</div>
        <div class="text-muted small">{{ doctor?.specialization }}</div>
      </div>
    </div>
  </div>
  <div class="col-status flex-grow-1  d-flex align-items-center ">
   <span>#{{prescription.id}}</span>
  </div>
  <div class="d-flex align-items-center justify-content-end">
     <button [routerLink]="['/patient/prescriptions', prescription.id]" class="btn btn-view-booking w-100 py-2">
            <span>View</span>
            <i class="bi bi-arrow-right ms-2"></i>
        </button>
  </div>


</div>
