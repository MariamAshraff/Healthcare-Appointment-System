<div class="card h-100 border-0 shadow-sm medical-record-card">

  <div class="doctor-header p-3 border-bottom d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center cursor-pointer">
      <div class="avatar-sm me-3">
        <img [src]="doctor?.avatar" class="rounded-circle shadow-sm border" width="45" height="45"
          style="object-fit: cover;">
      </div>
      <div>
        <h6 class="mb-0 fw-bold text-dark blue-color">
          {{ doctor?.name || 'Loading Doctor...' }}
        </h6>
        <span class="text-primary-soft x-small fw-medium blue-color">{{ doctor?.specialization | uppercase }}</span>
      </div>
    </div>
    <button class="btn btn-view-profile blue-color" title="View Profile" [routerLink]="['/doctor', doctor?.id]">
      <i class="bi bi-person-badge "></i>
    </button>
  </div>

  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="record-date">
        <i class="bi bi-calendar3 me-1 blue-color"></i> {{ medicalCard.date | date:'mediumDate' }}
      </span>
      <span class="badge blue-color fw-normal">ID: #{{ medicalCard.id.substring(0, 8) }}</span>
    </div>

    <div class="diagnosis-box mb-4">
      <h6 class="fw-bold text-dark-blue mb-2">
        <i class="bi bi-clipboard2-pulse-fill me-2 blue-color"></i>Diagnosis
      </h6>
      <p class="text-secondary small line-clamp-2 mb-0">{{ medicalCard.diagnosis }}</p>
    </div>

    <div class="notes-preview p-3 rounded-3 bg-light-soft mb-4">
      <label class="d-block x-small fw-bold text-uppercase text-muted mb-1">Doctor's Notes</label>
      <p class="small text-dark mb-0 italic">"{{ medicalCard.notes || 'No additional notes recorded.' }}"</p>
    </div>
  </div>
</div>
