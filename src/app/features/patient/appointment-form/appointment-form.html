<div class="card border-0 shadow-sm" style="border-radius: 20px; background-color: #ffffff;">
  <div class="card-header bg-white border-0 pt-4 px-4">
    <div class="d-flex align-items-center">
      <div class="icon-circle bg-purple-light text-purple me-3">
        <i class="bi bi-calendar-plus fs-4"></i>
      </div>
      <h5 class="fw-bold mb-0 text-dark-blue">Book an Appointment</h5>
    </div>
  </div>

  <div class="card-body p-4">
    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted">Appointment Date</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="bi bi-calendar3 text-purple"></i></span>
            <input type="date" formControlName="date" class="form-control bg-light border-0 py-2">
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted">Available Slots</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="bi bi-clock text-purple"></i></span>
            <select formControlName="timeSlot" class="form-select bg-light border-0 py-2">
              <option value="">Select a time slot</option>
              <option *ngFor="let slot of doctor?.availableSlots" [value]="slot.startTime + ' - ' + slot.endTime"
                [disabled]="slot.isBooked">
                {{ slot.day }}: {{ slot.startTime }} - {{ slot.endTime }}
                {{ slot.isBooked ? '(Reserved)' : '' }}
              </option>
            </select>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label small fw-bold text-muted">Additional Notes</label>
          <textarea formControlName="notes" class="form-control bg-light border-0" rows="4"
            placeholder="Describe your condition or specific requirements..."></textarea>
        </div>

        <div class="col-12">
          <div class="p-3 rounded-3 bg-light-soft mb-3 border border-dashed text-center" *ngIf="doctor">
            <p class="small text-muted mb-0">Consultation fee for <strong>{{ doctor.name }}</strong> is
              <span class="text-purple-dark fw-bold">${{ doctor.price }}</span>
            </p>
          </div>

          <button type="submit" [disabled]="appointmentForm.invalid"
            class="btn btn-primary-gradient w-100 py-3 fw-bold">
            Confirm and Book Now
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
