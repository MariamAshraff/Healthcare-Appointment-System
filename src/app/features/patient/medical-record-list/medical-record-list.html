<div class="container py-5">
  <div class="d-flex align-items-center mb-5">
    <div class="section-number me-3">
      <i class="bi bi-journal-medical text-white"></i>
    </div>
    <h2 class="fw-bold blue-text mb-0">Medical History</h2>
  </div>

  @if (medicalList && medicalList.length > 0) {
    <div class="row g-4">
      @for (record of medicalList; track record.id) {
        <div class="col-md-6 col-lg-4 animate__animated animate__fadeInUp">
          <app-medical-record-card [medicalCard]="record"></app-medical-record-card>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-5 bg-white shadow-sm rounded-4 border">
      <i class="bi bi-folder2-open display-1 text-muted opacity-25"></i>
      <h4 class="mt-3 fw-bold text-dark">No Medical Records Found</h4>
      <p class="text-muted">You don't have any medical history records at the moment.</p>
    </div>
  }
</div>
